<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LobbyfiedMC | Minecraft Survival Server</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #090a0f;
            --bg-card: #11131c;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #7e8396;
            --gradient-accent: linear-gradient(90deg, #8a46ff, #ff468b);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .server-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
        }

        .info-row:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .value {
            font-weight: 700;
            color: #fff;
        }

        .btn-copy {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: var(--gradient-accent);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(138, 70, 255, 0.3);
        }

        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 70, 255, 0.45);
        }

        .btn-copy:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="server-card">
    <div class="badge">● Online</div>
    <h1>LobbyfiedMC</h1>
    <p class="subtitle">Dein ultimatives Survival-Erlebnis</p>

    <div class="info-box">
        <div class="info-row">
            <span class="label">Server-IP</span>
            <span class="value" id="ipText">nicoprojects.dev</span>
        </div>
        <div class="info-row">
            <span class="label">Version</span>
            <span class="value">Alle Versionen unterstützt</span>
        </div>
        <div class="info-row">
            <span class="label">Gamemode</span>
            <span class="value">Survival</span>
        </div>
    </div>

    <button class="btn-copy" id="copyBtn">IP-Adresse kopieren</button>
</div>

<script>
    document.getElementById('copyBtn').addEventListener('click', function() {
        const ip = document.getElementById('ipText').innerText;
        navigator.clipboard.writeText(ip).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = 'IP kopiert!';
            btn.style.background = '#10b981'; // Wechselt kurz zu Grün
            
            setTimeout(() => {
                btn.innerText = 'IP-Adresse kopieren';
                btn.style.background = 'linear-gradient(90deg, #8a46ff, #ff468b)';
            }, 2000);
        });
    });
</script>

</body>
</html>
