<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            text-align:center;
        }

        .container{
            padding:40px;
        }

        h1{
            font-size:8rem;
            margin-bottom:10px;
            text-shadow:0 0 20px rgba(255,255,255,0.3);
        }

        h2{
            font-size:2rem;
            margin-bottom:15px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:25px;
        }

        .btn{
            display:inline-block;
            padding:12px 24px;
            background:#3b82f6;
            color:white;
            text-decoration:none;
            border-radius:10px;
            transition:0.3s;
        }

        .btn:hover{
            background:#2563eb;
            transform:translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist.</p>

        <a href="/" class="btn">Go Home</a>
    </div>

</body>
</html>
